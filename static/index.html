<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Story Pointer</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #08111f;
    --panel: #111d2f;
    --panel-2: #19283e;
    --panel-3: #21334d;
    --text: #f4f7fb;
    --muted: #aebed3;
    --accent: #5aa9ff;
    --accent-strong: #2f8fff;
    --green: #49d889;
    --amber: #f2bd52;
    --red: #ff6b6b;
    --border: #30445f;
    --border-strong: #45617f;
    --mono: "JetBrains Mono", "SF Mono", Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html { min-width: 320px; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at 18% 0%, rgba(47,143,255,0.08), transparent 32rem), var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }
  header {
    padding: 14px clamp(16px, 3vw, 42px);
    background: rgba(17,29,47,0.96);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    position: sticky;
    top: 0;
    z-index: 20;
    backdrop-filter: blur(12px);
  }
  header h1 { margin: 0; font-size: 18px; display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
  header .badge {
    font-size: 11px; padding: 4px 9px; border-radius: 999px;
    background: var(--panel-2); color: var(--muted);
    font-family: var(--mono);
    border: 1px solid var(--border);
  }
  header a.badge { text-decoration: none; color: var(--accent); }
  header a.badge:hover { border-color: var(--accent); }
  header .header-links { display: flex; gap: 8px; align-items: center; }
  .container {
    display: grid;
    grid-template-columns: minmax(380px, 0.72fr) minmax(640px, 1.28fr);
    align-items: start;
    gap: 24px;
    padding: 28px clamp(16px, 3vw, 42px) 48px;
    max-width: 1720px;
    margin: 0 auto;
  }
  .panel {
    background: linear-gradient(180deg, rgba(21,35,55,0.98), rgba(17,29,47,0.98));
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: clamp(16px, 2vw, 24px);
    min-width: 0;
    box-shadow: 0 18px 50px rgba(0,0,0,0.22);
  }
  #input-panel { position: sticky; top: 82px; }
  .panel h2 { margin: 0 0 16px; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; }
  label { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 6px; font-weight: 650; }
  input, textarea, select {
    width: 100%; padding: 11px 12px; background: rgba(25,40,62,0.92);
    border: 1px solid var(--border); border-radius: 8px; color: var(--text);
    font-size: 14px; font-family: inherit; transition: border-color 150ms ease, box-shadow 150ms ease;
  }
  input:hover, textarea:hover, select:hover { border-color: var(--border-strong); }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(90,169,255,0.16); }
  input[type="file"] { padding: 7px; }
  input[type="file"]::file-selector-button { border: 0; border-radius: 6px; padding: 7px 11px; margin-right: 10px; background: var(--panel-3); color: var(--text); font-weight: 650; cursor: pointer; }
  textarea { min-height: 92px; resize: vertical; font-family: var(--mono); font-size: 13px; }
  .row { display: flex; gap: 12px; }
  .row > div { flex: 1; }
  button {
    padding: 10px 18px; border: 1px solid transparent; border-radius: 8px; font-size: 14px;
    font-weight: 700; cursor: pointer; background: var(--accent-strong); color: white;
    transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
  }
  button:hover:not(:disabled) { transform: translateY(-1px); background: var(--accent); }
  button:focus-visible, summary:focus-visible, a:focus-visible { outline: 3px solid rgba(90,169,255,0.5); outline-offset: 2px; }
  button.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
  button.secondary:hover:not(:disabled) { background: var(--panel-3); border-color: var(--accent); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .actions { margin-top: 16px; display: flex; gap: 10px; }

  .result-head { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 16px; }
  .result-head h2 { margin: 0; }
  .result-actions { display: flex; align-items: center; justify-content: flex-end; gap: 7px; flex-wrap: wrap; }
  .result-actions button { padding: 7px 11px; font-size: 12px; background: var(--panel-2); border: 1px solid var(--border); }
  .result-actions button.active { background: var(--accent-strong); border-color: var(--accent); }
  .result-actions .export-button { color: var(--accent); }

  /* result card */
  .result-empty { color: var(--muted); padding: 56px 20px; text-align: center; border: 1px dashed var(--border); border-radius: 10px; }
  .status-bar { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 9px; margin-bottom: 12px; font-size: 13px; }
  .status-bar .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .batch-toolbar { padding: 15px 16px; background: rgba(25,40,62,0.97); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 14px; position: sticky; top: 78px; z-index: 10; box-shadow: 0 10px 28px rgba(0,0,0,0.22); backdrop-filter: blur(10px); }
  .batch-summary { display: flex; align-items: center; justify-content: space-between; gap: 16px; font-size: 13px; margin-bottom: 10px; }
  .batch-summary strong { font-size: 14px; }
  .batch-stats { display: flex; align-items: center; gap: 10px; color: var(--muted); }
  .batch-percent { color: var(--accent); font-family: var(--mono); font-weight: 800; }
  .batch-progress { height: 9px; overflow: hidden; border-radius: 999px; background: #07101d; border: 1px solid rgba(255,255,255,0.04); }
  .batch-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-strong), #75c2ff); transition: width 180ms ease; }
  .batch-list { display: grid; gap: 10px; }
  .batch-item { border: 1px solid var(--border); border-radius: 10px; background: var(--panel-2); overflow: hidden; transition: border-color 150ms ease, background 150ms ease; }
  .batch-item:hover { border-color: var(--border-strong); background: #1c2d45; }
  .batch-item.failed { border-color: rgba(248,81,73,0.65); }
  .batch-item.done { border-color: rgba(46,160,67,0.55); }
  .batch-item summary { display: grid; grid-template-columns: 18px 40px minmax(190px,0.9fr) minmax(300px,1.5fr); align-items: center; gap: 10px; padding: 14px 16px; cursor: pointer; list-style: none; }
  .batch-item summary::-webkit-details-marker { display: none; }
  .batch-item summary::before { content: "›"; color: var(--muted); font-size: 24px; line-height: 1; transition: transform 150ms ease; }
  .batch-item[open] summary::before { transform: rotate(90deg); }
  .batch-index { color: var(--muted); font-family: var(--mono); font-size: 11px; }
  .batch-title { min-width: 0; font-weight: 750; font-size: 14px; line-height: 1.35; overflow-wrap: break-word; }
  .batch-meta { min-width: 0; display: flex; justify-content: flex-end; align-items: center; gap: 10px; color: var(--muted); font-size: 12px; }
  .batch-result-chip, .batch-status-chip { flex: none; padding: 4px 9px; border-radius: 999px; border: 1px solid currentColor; font-family: var(--mono); font-weight: 800; white-space: nowrap; }
  .batch-result-summary { min-width: 0; line-height: 1.4; text-align: left; }
  .batch-item.done .batch-meta { color: var(--green); }
  .batch-item.failed .batch-meta { color: var(--red); }
  .batch-item.running .batch-status-chip { color: var(--accent); }
  .batch-item.pending .batch-status-chip { color: var(--muted); }
  .batch-detail { padding: clamp(14px,2vw,22px); border-top: 1px solid var(--border); background: var(--panel); }
  .batch-detail .points-hero .num { font-size: 38px; }

  .summary-kpis { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 10px; margin-bottom: 16px; }
  .summary-kpi { padding: 14px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 9px; }
  .summary-kpi .value { display: block; color: var(--accent); font: 800 24px/1 var(--mono); margin-bottom: 6px; }
  .summary-kpi .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
  .summary-table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; }
  .summary-table { width: 100%; min-width: 760px; border-collapse: collapse; font-size: 12px; }
  .summary-table th, .summary-table td { padding: 11px 12px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
  .summary-table th { color: var(--muted); background: var(--panel-2); font-size: 10px; text-transform: uppercase; letter-spacing: .06em; position: sticky; top: 0; }
  .summary-table tr:last-child td { border-bottom: 0; }
  .summary-table .summary-story { min-width: 210px; font-weight: 700; overflow-wrap: break-word; }
  .summary-table .summary-tldr { min-width: 280px; color: var(--muted); }
  .summary-status { display: inline-block; padding: 3px 7px; border: 1px solid currentColor; border-radius: 999px; white-space: nowrap; font-family: var(--mono); font-size: 10px; }
  .summary-status.ok { color: var(--green); }
  .summary-status.failed { color: var(--red); }

  .points-hero {
    display: grid; grid-template-columns: auto auto minmax(220px,1fr); align-items: center; gap: 16px; padding: 18px; border-radius: 10px;
    background: linear-gradient(135deg, #1b3151, #243a5d); border: 1px solid var(--border-strong);
    margin-bottom: 14px;
  }
  .points-hero .num { font-size: 48px; font-weight: 800; color: var(--accent); font-family: var(--mono); line-height: 1; }
  .points-hero .unit { color: var(--muted); font-size: 14px; }
  .points-hero .tldr { text-align: right; }
  .points-hero .tldr-text { font-size: 14px; }

  .must-split-banner {
    background: rgba(248,81,73,0.12); border: 1px solid var(--red); color: var(--red);
    padding: 10px 14px; border-radius: 6px; margin-bottom: 12px; font-size: 13px; font-weight: 600;
  }
  .invariant-warn {
    background: rgba(210,153,34,0.12); border: 1px solid var(--amber); color: var(--amber);
    padding: 10px 14px; border-radius: 6px; margin-bottom: 12px; font-size: 13px;
  }

  .section { margin-bottom: 20px; }
  .section h3 { margin: 0 0 8px; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
  .why { font-size: 14px; padding: 14px; background: var(--panel-2); border-radius: 8px; border-left: 3px solid var(--accent); overflow-wrap: anywhere; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .factor { display: grid; grid-template-columns: minmax(0,1fr) auto; align-items: center; gap: 10px; padding: 9px 11px; background: var(--panel-2); border-radius: 7px; font-size: 13px; }
  .factor > span:first-child { min-width: 0; }
  .factor .lvl { font-size: 11px; padding: 2px 7px; border-radius: 3px; font-weight: 600; }
  .lvl-Low { background: rgba(46,160,67,0.2); color: var(--green); }
  .lvl-Medium { background: rgba(210,153,34,0.2); color: var(--amber); }
  .lvl-High { background: rgba(248,81,73,0.2); color: var(--red); }
  .factor .ev { color: var(--muted); font-size: 12px; margin-top: 3px; display: block; line-height: 1.35; }

  .list { list-style: none; padding: 0; margin: 0; }
  .list li { padding: 6px 10px; background: var(--panel-2); border-radius: 5px; margin-bottom: 4px; font-size: 13px; }
  .pill-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill { padding: 4px 10px; border-radius: 12px; background: var(--panel-2); font-size: 12px; }
  .pill.strong { border: 1px solid var(--accent); color: var(--accent); }
  .upload-summary { margin: 12px 0 9px; }
  .story-chip-list { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 6px; max-height: 230px; overflow: auto; padding-right: 4px; }
  .story-chip { display: flex; align-items: baseline; gap: 7px; min-width: 0; padding: 7px 9px; background: var(--panel-2); border: 1px solid transparent; border-radius: 7px; font-size: 12px; line-height: 1.3; }
  .story-chip:hover { border-color: var(--border-strong); }
  .story-chip-index { flex: none; color: var(--accent); font-family: var(--mono); font-size: 10px; }
  .story-chip-title { min-width: 0; overflow-wrap: break-word; }

  .split-card { padding: 10px; background: var(--panel-2); border-radius: 6px; margin-bottom: 6px; }
  .split-card .st { font-weight: 600; }
  .split-card .sp { float: right; color: var(--accent); font-family: var(--mono); font-weight: 700; }

  .raw-toggle { margin-top: 14px; }
  .raw-toggle summary { cursor: pointer; color: var(--muted); font-size: 12px; }
  pre { background: #0a0e14; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 12px; }

  .src-tabs { display: flex; gap: 4px; margin-bottom: 14px; }
  .src-tabs button { flex: 1; padding: 8px; font-size: 13px; background: var(--panel-2); border: 1px solid var(--border); }
  .src-tabs button.active { background: var(--accent); border-color: var(--accent); }
  .src-panel { display: none; }
  .src-panel.active { display: block; }
  .err { color: var(--red); font-size: 13px; margin-top: 8px; }

  @media (max-width: 1120px) {
    .container { grid-template-columns: minmax(340px,0.8fr) minmax(520px,1.2fr); }
    .batch-item summary { grid-template-columns: 18px 36px minmax(150px,0.8fr) minmax(220px,1.2fr); }
    .grid2 { grid-template-columns: 1fr; }
  }
  @media (max-width: 920px) {
    header { position: static; }
    .container { grid-template-columns: minmax(0,1fr); padding-top: 18px; }
    #input-panel { position: static; }
    .batch-toolbar { top: 8px; }
  }
  @media (max-width: 680px) {
    header { align-items: flex-start; flex-direction: column; }
    .header-links { flex-wrap: wrap; }
    .panel { border-radius: 10px; }
    .batch-summary { align-items: flex-start; flex-direction: column; gap: 5px; }
    .batch-item summary { grid-template-columns: 18px 34px minmax(0,1fr); gap: 8px; }
    .batch-meta { grid-column: 3; justify-content: flex-start; align-items: flex-start; flex-direction: column; gap: 6px; }
    .points-hero { grid-template-columns: auto 1fr; }
    .points-hero .tldr { grid-column: 1 / -1; text-align: left; border-top: 1px solid var(--border); padding-top: 12px; }
    .story-chip-list { grid-template-columns: 1fr; }
    .result-head { align-items: flex-start; flex-direction: column; }
    .result-actions { justify-content: flex-start; }
    .summary-kpis { grid-template-columns: repeat(2,minmax(0,1fr)); }
  }
</style>
</head>
<body>
<header>
  <h1>🎯 Story Pointer <span class="badge" id="model-badge">…</span></h1>
  <div class="header-links">
    <a class="badge" id="phoenix-link" href="#" target="_blank" rel="noopener" style="display:none">Phoenix monitoring ↗</a>
    <span class="badge">evidence-led estimation</span>
  </div>
</header>

<div class="container">
  <!-- =========================== INPUT =========================== -->
  <section class="panel" id="input-panel">
    <h2>Story</h2>
    <div class="src-tabs">
      <button class="active" data-src="manual" onclick="switchSrc('manual')">Manual</button>
      <button data-src="jira" onclick="switchSrc('jira')">Jira</button>
      <button data-src="sheet" onclick="switchSrc('sheet')">Spreadsheet</button>
    </div>

    <!-- manual -->
    <div class="src-panel active" id="src-manual">
      <label>Title *</label>
      <input id="m_title" placeholder="e.g. Add transaction dispute workflow" />
      <label>Description</label>
      <textarea id="m_desc" placeholder="As a customer, I want to dispute a transaction…"></textarea>
      <label>Acceptance criteria (one per line)</label>
      <textarea id="m_ac" placeholder="- Given a posted transaction
- When the customer opens dispute
- Then a case is created"></textarea>
      <label>Context (optional)</label>
      <input id="m_ctx" placeholder="links, tech notes…" />
    </div>

    <!-- jira -->
    <div class="src-panel" id="src-jira">
      <div id="jira_instances_empty" class="result-empty" style="padding:14px 0">
        No Jira instances configured. Set <code>JIRA_INSTANCES</code> in .env.
      </div>
      <div id="jira_fields" style="display:none">
        <label>Instance</label>
        <select id="j_instance"></select>
        <label>Issue key *</label>
        <input id="j_issue" placeholder="PROJ-123" />
        <div class="actions">
          <button class="secondary" onclick="fetchJira()">Fetch story</button>
        </div>
        <div id="jira_preview" style="margin-top:12px"></div>
      </div>
    </div>

    <!-- spreadsheet -->
    <div class="src-panel" id="src-sheet">
      <label>Upload CSV / XLS / XLSX</label>
      <input type="file" id="sheet_file" accept=".csv,.xls,.xlsx" onchange="uploadSheet()" />
      <div id="sheet_preview" style="margin-top:12px"></div>
    </div>

    <div class="actions">
      <button id="estimate-btn" onclick="runEstimate()">Estimate</button>
      <button class="secondary" onclick="clearAll()">Clear</button>
    </div>
    <div id="err" class="err"></div>
  </section>

  <!-- =========================== RESULT =========================== -->
  <section class="panel" id="result-panel">
    <div class="result-head">
      <h2>Estimate</h2>
      <div class="result-actions" id="result-actions" style="display:none" aria-label="Final result actions">
        <button id="summary-view-btn" class="secondary" onclick="setResultView('summary')">Summary</button>
        <button id="detail-view-btn" class="secondary" onclick="setResultView('details')">Details</button>
        <button class="secondary export-button" onclick="exportMarkdown()">Export MD</button>
        <button id="excel-export-btn" class="secondary export-button" onclick="exportExcel()">Export Excel</button>
      </div>
    </div>
    <div id="result-body">
      <div class="result-empty">Run an estimate to see the evidence-led result here.</div>
    </div>
  </section>
</div>

<script>
// ============================================================================
// CORE PRODUCT INVARIANT — enforced client-side INDEPENDENTLY of the backend.
// ResultCard refuses to render a number unless plain_language_why + tldr exist.
// ============================================================================
function invariantSatisfied(r) {
  return r && r.ok === true
    && r.points != null && [1,2,3,5,8,13].includes(r.points)
    && typeof r.plain_language_why === "string" && r.plain_language_why.trim()
    && typeof r.tldr === "string" && r.tldr.trim();
}

const $ = (id) => document.getElementById(id);
window.__final_results = null;
window.__result_view = "summary";

function setResultActions(visible) {
  $("result-actions").style.display = visible ? "flex" : "none";
}

function syncResultActionState() {
  $("summary-view-btn").classList.toggle("active", window.__result_view === "summary");
  $("detail-view-btn").classList.toggle("active", window.__result_view === "details");
}

function setResultView(view) {
  if (!window.__final_results || !["summary", "details"].includes(view)) return;
  window.__result_view = view;
  syncResultActionState();
  if (window.__final_results.kind === "batch") {
    renderBatchResults();
    return;
  }
  const item = window.__final_results.items[0];
  $("result-body").innerHTML = view === "summary"
    ? summaryHtml(window.__final_results.items)
    : resultHtml(item.result, item.trace_id || "");
}

// ---- source tabs ----
function switchSrc(name) {
  document.querySelectorAll(".src-tabs button").forEach(b => b.classList.toggle("active", b.dataset.src === name));
  document.querySelectorAll(".src-panel").forEach(p => p.classList.toggle("active", p.id === "src-" + name));
}

// ---- config ----
async function loadConfig() {
  try {
    const r = await fetch("/config").then(r => r.json());
    $("model-badge").textContent = `${r.provider} · ${r.model}` + (r.has_api_key ? "" : " · ⚠ no key");
    window.__observability = r.observability || null;
    if (r.observability && r.observability.enabled && r.observability.ui_url) {
      const phoenixLink = $("phoenix-link");
      phoenixLink.href = r.observability.ui_url;
      phoenixLink.style.display = "inline-block";
      phoenixLink.title = `Phoenix project: ${r.observability.project_name}`;
    }
    if (r.jira_instances && r.jira_instances.length) {
      $("jira_instances_empty").style.display = "none";
      $("jira_fields").style.display = "block";
      $("j_instance").innerHTML = r.jira_instances.map(n => `<option>${n}</option>`).join("");
    }
  } catch (e) { console.warn(e); }
}

// ---- gather story from the active source ----
function currentStory() {
  const active = document.querySelector(".src-tabs button.active").dataset.src;
  if (active === "manual") {
    const ac = $("m_ac").value.split("\n").map(s => s.trim().replace(/^[-*]\s*/, "")).filter(Boolean);
    return {
      title: $("m_title").value.trim(),
      description: $("m_desc").value,
      acceptance_criteria: ac,
      context: $("m_ctx").value,
      source: "manual",
    };
  }
  if (active === "jira") {
    return window.__jira_story || null;
  }
  if (active === "sheet") {
    return window.__sheet_stories && window.__sheet_stories.length ? window.__sheet_stories[0] : null;
  }
  return null;
}

// ---- Jira fetch ----
async function fetchJira() {
  $("err").textContent = "";
  const inst = $("j_instance").value;
  const issue = $("j_issue").value.trim();
  if (!issue) return;
  try {
    const r = await fetch("/jira/fetch", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ instance: inst, issue }),
    }).then(r => r.json());
    if (r.detail) { $("err").textContent = r.detail; return; }
    window.__jira_story = r;
    $("jira_preview").innerHTML = `<div class="pill-row"><span class="pill strong">${escapeHtml(r.title)}</span></div>`;
  } catch (e) { $("err").textContent = e; }
}

// ---- Spreadsheet ----
async function uploadSheet() {
  $("err").textContent = "";
  const f = $("sheet_file").files[0];
  if (!f) return;
  const fd = new FormData();
  fd.append("file", f);
  try {
    const r = await fetch("/upload", { method: "POST", body: fd }).then(r => r.json());
    if (r.detail) { $("err").textContent = r.detail; return; }
    window.__sheet_stories = r.stories || [];
    $("sheet_preview").innerHTML =
      `<div class="upload-summary"><span class="pill strong">${r.count} stories parsed · all will be estimated</span></div>` +
      `<div class="story-chip-list">` +
      r.stories.map((s, index) => `<div class="story-chip"><span class="story-chip-index">#${index + 1}</span><span class="story-chip-title">${escapeHtml(s.title)}</span></div>`).join("") +
      `</div>`;
  } catch (e) { $("err").textContent = e; }
}

// ---- Estimation via SSE ----
// EventSource only supports GET. This endpoint is POST-based, so use fetch's
// ReadableStream directly and own the request lifecycle with AbortController.
let estimateController = null;
async function runEstimate() {
  $("err").textContent = "";
  window.__final_results = null;
  setResultActions(false);
  const active = document.querySelector(".src-tabs button.active").dataset.src;
  if (active === "sheet" && window.__sheet_stories && window.__sheet_stories.length) {
    return runBatchEstimate(window.__sheet_stories);
  }
  const story = currentStory();
  if (!story || !story.title) {
    $("err").textContent = "Provide a story with a title first.";
    return;
  }
  $("estimate-btn").disabled = true;
  $("result-body").innerHTML = renderStatus("Starting…");

  // Cancel an older request defensively (for example if this function is
  // called programmatically while a stream is still active).
  if (estimateController) estimateController.abort();
  const controller = new AbortController();
  estimateController = controller;
  let reader = null;

  try {
    const resp = await fetch("/estimate", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "text/event-stream" },
      body: JSON.stringify({ story }),
      signal: controller.signal,
    });

    if (!resp.ok) {
      const detail = await responseError(resp);
      throw new Error(detail || `Estimate request failed (${resp.status}).`);
    }
    const contentType = resp.headers.get("content-type") || "";
    if (!contentType.toLowerCase().includes("text/event-stream")) {
      throw new Error(`Expected an SSE response, received ${contentType || "no content type"}.`);
    }
    if (!resp.body) throw new Error("This browser did not provide a readable response stream.");

    reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = "";
    let terminalEvent = false;

    while (true) {
      const { value, done } = await reader.read();
      if (done) {
        buf += dec.decode();
        break;
      }
      buf += dec.decode(value, { stream: true });

      // SSE permits either LF or CRLF line endings. Keep the final incomplete
      // frame buffered until the next network chunk arrives.
      const parts = buf.split(/\r?\n\r?\n/);
      buf = parts.pop() || "";
      for (const part of parts) {
        const evt = parseSSE(part);
        if (!evt) continue;
        handleSSE(evt);
        if (evt.event === "result") terminalEvent = true;
        if (evt.event === "error") {
          terminalEvent = true;
          throw new Error(evt.data.message || "The estimate stream reported an error.");
        }
      }
    }

    // Be tolerant of a final event that is not followed by a blank line.
    if (buf.trim()) {
      const evt = parseSSE(buf);
      if (evt) {
        handleSSE(evt);
        if (evt.event === "result") terminalEvent = true;
        if (evt.event === "error") throw new Error(evt.data.message || "The estimate stream reported an error.");
      }
    }

    if (!terminalEvent) {
      throw new Error("The estimate stream closed before returning a result.");
    }
  } catch (e) {
    if (e && e.name === "AbortError") return;
    const message = e instanceof Error ? e.message : String(e);
    $("err").textContent = message;
    $("result-body").innerHTML = `<div class="invariant-warn">${escapeHtml(message)}</div>`;
  } finally {
    if (reader) reader.releaseLock();
    if (estimateController === controller) {
      estimateController = null;
      $("estimate-btn").disabled = false;
    }
  }
}

async function runBatchEstimate(stories) {
  $("err").textContent = "";
  window.__final_results = null;
  setResultActions(false);
  if (!stories || !stories.length) {
    $("err").textContent = "Upload a spreadsheet containing at least one story.";
    return;
  }

  if (estimateController) estimateController.abort();
  const controller = new AbortController();
  estimateController = controller;
  $("estimate-btn").disabled = true;
  window.__batch_state = {
    total: stories.length,
    succeeded: 0,
    failed: 0,
    complete: false,
    traceId: "",
    items: stories.map((story, index) => ({
      index, title: story.title, status: "pending", message: "Waiting…",
      result: null, error: "", traceId: "",
    })),
  };
  renderBatchResults();

  let reader = null;
  let completedEvent = false;
  const accept = evt => {
    if (!evt) return;
    handleBatchSSE(evt);
    if (evt.event === "batch_complete") completedEvent = true;
    if (evt.event === "error") {
      throw new Error(evt.data.message || "The batch stream reported an error.");
    }
  };

  try {
    const resp = await fetch("/estimate/batch", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "text/event-stream" },
      body: JSON.stringify({ stories }),
      signal: controller.signal,
    });
    if (!resp.ok) {
      const detail = await responseError(resp);
      throw new Error(detail || `Batch estimate request failed (${resp.status}).`);
    }
    const contentType = resp.headers.get("content-type") || "";
    if (!contentType.toLowerCase().includes("text/event-stream")) {
      throw new Error(`Expected an SSE response, received ${contentType || "no content type"}.`);
    }
    if (!resp.body) throw new Error("This browser did not provide a readable response stream.");

    reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = "";
    while (true) {
      const { value, done } = await reader.read();
      if (done) {
        buf += dec.decode();
        break;
      }
      buf += dec.decode(value, { stream: true });
      const parts = buf.split(/\r?\n\r?\n/);
      buf = parts.pop() || "";
      for (const part of parts) accept(parseSSE(part));
    }
    if (buf.trim()) accept(parseSSE(buf));
    if (!completedEvent) throw new Error("The batch stream closed before all rows completed.");
  } catch (e) {
    if (e && e.name === "AbortError") return;
    const message = e instanceof Error ? e.message : String(e);
    $("err").textContent = message;
    const state = window.__batch_state;
    if (state) {
      state.streamError = message;
      renderBatchResults();
    }
  } finally {
    if (reader) reader.releaseLock();
    if (estimateController === controller) {
      estimateController = null;
      $("estimate-btn").disabled = false;
    }
  }
}

function handleBatchSSE(evt) {
  const state = window.__batch_state;
  if (!state || !evt || !evt.data) return;
  const data = evt.data;
  if (data.trace_id) {
    state.traceId = data.trace_id;
    window.__trace_id = data.trace_id;
  }
  if (evt.event === "batch_start") {
    state.total = data.total;
  } else if (Number.isInteger(data.index) && state.items[data.index]) {
    const item = state.items[data.index];
    if (data.trace_id) item.traceId = data.trace_id;
    if (evt.event === "item_start") {
      item.status = "running";
      item.message = "Starting…";
    } else if (evt.event === "item_status") {
      item.status = "running";
      item.message = data.message || "Working…";
    } else if (evt.event === "item_result") {
      item.result = data.result;
      item.status = data.result && data.result.ok ? "done" : "failed";
      item.error = data.result && data.result.error ? data.result.error : "";
      item.message = item.status === "done" ? "Complete" : "Estimate was not certified";
    } else if (evt.event === "item_error") {
      item.status = "failed";
      item.error = data.message || "Estimation failed.";
      item.message = item.error;
    }
  }
  if (evt.event === "batch_complete") {
    state.complete = true;
    state.succeeded = data.succeeded;
    state.failed = data.failed;
    window.__final_results = {
      kind: "batch",
      generated_at: new Date().toISOString(),
      items: state.items.map(item => ({
        index: item.index,
        title: item.title,
        status: item.status === "done" ? "done" : "failed",
        result: item.result || null,
        error: item.error || "",
        trace_id: item.traceId || state.traceId || "",
      })),
    };
    window.__result_view = "summary";
    setResultActions(true);
    syncResultActionState();
  }
  renderBatchResults();
}

function renderBatchResults() {
  const state = window.__batch_state;
  if (!state) return;
  if (state.complete && window.__final_results && window.__result_view === "summary") {
    $("result-body").innerHTML = summaryHtml(window.__final_results.items);
    return;
  }
  const openItems = new Set(
    Array.from(document.querySelectorAll(".batch-item[open]"))
      .map(el => Number(el.dataset.index))
  );
  const completed = state.items.filter(item => item.status === "done" || item.status === "failed").length;
  const succeeded = state.items.filter(item => item.status === "done").length;
  const failed = state.items.filter(item => item.status === "failed").length;
  const pct = state.total ? Math.round((completed / state.total) * 100) : 0;
  let html = `<div class="batch-toolbar">
    <div class="batch-summary"><strong>${completed}/${state.total} items complete</strong>
      <span class="batch-stats"><span>${succeeded} succeeded · ${failed} failed${state.complete ? " · batch finished" : ""}</span><span class="batch-percent">${pct}%</span></span></div>
    <div class="batch-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="${pct}" aria-label="Batch completion"><div class="batch-progress-fill" style="width:${pct}%"></div></div>
  </div>`;
  if (state.streamError) {
    html += `<div class="invariant-warn">${escapeHtml(state.streamError)}</div>`;
  }
  html += `<div class="batch-list">`;
  for (const item of state.items) {
    let metaHtml = `<span class="batch-status-chip">${escapeHtml(item.message)}</span>`;
    if (item.status === "done" && item.result) {
      metaHtml = `<span class="batch-result-chip">${escapeHtml(item.result.points)} pts</span><span class="batch-result-summary">${escapeHtml(item.result.tldr || "Complete")}</span>`;
    } else if (item.status === "failed") {
      metaHtml = `<span class="batch-result-chip">Failed</span><span class="batch-result-summary">${escapeHtml(item.error || item.message || "Estimation failed")}</span>`;
    }
    const detail = item.result
      ? resultHtml(item.result, item.traceId || state.traceId)
      : item.status === "failed"
        ? `<div class="invariant-warn">${escapeHtml(item.error || "Estimation failed.")}</div>`
        : renderStatus(item.message);
    html += `<details class="batch-item ${item.status}" data-index="${item.index}"${openItems.has(item.index) ? " open" : ""}>
      <summary><span class="batch-index">#${item.index + 1}</span>
        <span class="batch-title">${escapeHtml(item.title)}</span>
        <span class="batch-meta">${metaHtml}</span></summary>
      <div class="batch-detail">${detail}</div>
    </details>`;
  }
  html += `</div>`;
  $("result-body").innerHTML = html;
}

function parseSSE(chunk) {
  let event = "message";
  const dataLines = [];
  for (const line of chunk.split(/\r?\n/)) {
    if (line.startsWith("event:")) event = line.slice(6).trim();
    else if (line.startsWith("data:")) dataLines.push(line.slice(5).trimStart());
  }
  const dataStr = dataLines.join("\n");
  if (!dataStr) return null;
  try { return { event, data: JSON.parse(dataStr) }; } catch { return null; }
}

async function responseError(resp) {
  const text = await resp.text();
  if (!text) return "";
  try {
    const body = JSON.parse(text);
    return body.detail || body.message || text;
  } catch {
    return text;
  }
}

function handleSSE(evt) {
  if (evt.data && evt.data.trace_id) window.__trace_id = evt.data.trace_id;
  if (evt.event === "status") {
    $("result-body").innerHTML = renderStatus(evt.data.message);
  } else if (evt.event === "result") {
    renderResult(evt.data.result);
  }
}

// ============================================================================
// ResultCard — THE client-side invariant enforcement
// ============================================================================
function renderStatus(msg) {
  return `<div class="status-bar"><span class="dot"></span>${escapeHtml(msg || "working…")}</div>`;
}

function renderResult(r) {
  const story = currentStory();
  window.__final_results = {
    kind: "single",
    generated_at: new Date().toISOString(),
    items: [{
      index: 0,
      title: (r && r.title) || (story && story.title) || "Story estimate",
      status: invariantSatisfied(r) ? "done" : "failed",
      result: r || null,
      error: r && r.error ? r.error : "",
      trace_id: window.__trace_id || "",
    }],
  };
  window.__result_view = "summary";
  setResultActions(true);
  syncResultActionState();
  $("result-body").innerHTML = summaryHtml(window.__final_results.items);
}

// ---- Final summary + exports ------------------------------------------------
function summaryHtml(items) {
  const certified = items.filter(item => invariantSatisfied(item.result));
  const failed = items.length - certified.length;
  const totalPoints = certified.reduce((sum, item) => sum + item.result.points, 0);
  const average = certified.length ? (totalPoints / certified.length).toFixed(1) : "—";
  let html = `<div class="summary-kpis">
    <div class="summary-kpi"><span class="value">${items.length}</span><span class="label">Total stories</span></div>
    <div class="summary-kpi"><span class="value">${certified.length}</span><span class="label">Certified</span></div>
    <div class="summary-kpi"><span class="value">${failed}</span><span class="label">Failed / redacted</span></div>
    <div class="summary-kpi"><span class="value">${average}</span><span class="label">Average points</span></div>
  </div>`;
  html += `<div class="summary-table-wrap"><table class="summary-table">
    <thead><tr><th>#</th><th>Story</th><th>Status</th><th>Points</th><th>Person-days</th><th>Split</th><th>TL;DR / error</th></tr></thead><tbody>`;
  for (const item of items) {
    const r = item.result;
    const ok = invariantSatisfied(r);
    const pd = r && r.person_days ? `${r.person_days.min}–${r.person_days.max}` : "—";
    const note = ok ? r.tldr : (item.error || (r && r.error) || "Estimate was not certified");
    html += `<tr>
      <td>${item.index + 1}</td>
      <td class="summary-story">${escapeHtml(item.title || (r && r.title) || "Untitled")}</td>
      <td><span class="summary-status ${ok ? "ok" : "failed"}">${ok ? "Certified" : "Failed"}</span></td>
      <td>${ok ? escapeHtml(r.points) : "—"}</td>
      <td>${escapeHtml(pd)}</td>
      <td>${r && r.must_split ? "Required" : "No"}</td>
      <td class="summary-tldr">${escapeHtml(note)}</td>
    </tr>`;
  }
  html += `</tbody></table></div>`;
  if (certified.length) {
    html += `<div class="section" style="margin-top:16px"><h3>Portfolio totals</h3><div class="why">${totalPoints} certified story points across ${certified.length} ${certified.length === 1 ? "story" : "stories"}. Use Details for complete evidence, risks, assumptions, and recommended splits.</div></div>`;
  }
  return html;
}

function markdownCell(value) {
  return String(value == null ? "" : value).replace(/\|/g, "\\|").replace(/\r?\n/g, " ");
}

function markdownList(values, render = value => String(value)) {
  return values && values.length ? values.map(value => `- ${render(value)}`).join("\n") : "- None reported";
}

function buildMarkdownExport(finalResults) {
  const items = finalResults.items || [];
  const certified = items.filter(item => invariantSatisfied(item.result));
  const totalPoints = certified.reduce((sum, item) => sum + item.result.points, 0);
  const lines = [
    "# Story Pointer — Final Estimate Summary",
    "",
    `Generated: ${finalResults.generated_at || new Date().toISOString()}`,
    "",
    `- Total stories: ${items.length}`,
    `- Certified: ${certified.length}`,
    `- Failed / redacted: ${items.length - certified.length}`,
    `- Total certified points: ${totalPoints}`,
    "",
    "| # | Story | Status | Points | Person-days | Must split | TL;DR / error |",
    "|---:|---|---|---:|---|---|---|",
  ];
  for (const item of items) {
    const r = item.result;
    const ok = invariantSatisfied(r);
    const pd = r && r.person_days ? `${r.person_days.min}–${r.person_days.max}` : "";
    lines.push(`| ${item.index + 1} | ${markdownCell(item.title || (r && r.title))} | ${ok ? "Certified" : "Failed / redacted"} | ${ok ? r.points : ""} | ${pd} | ${r && r.must_split ? "Yes" : "No"} | ${markdownCell(ok ? r.tldr : (item.error || (r && r.error)))} |`);
  }

  for (const item of items) {
    const r = item.result;
    const ok = invariantSatisfied(r);
    lines.push("", `## ${item.index + 1}. ${item.title || (r && r.title) || "Untitled"}`, "");
    if (!ok) {
      lines.push(`**Status:** Failed / redacted`, "", item.error || (r && r.error) || "Estimate was not certified.");
      continue;
    }
    const pd = r.person_days ? `${r.person_days.min}–${r.person_days.max} person-days` : "Not provided";
    lines.push(
      `**Points:** ${r.points}  `,
      `**Person-days:** ${pd}  `,
      `**Provider/model:** ${r.provider || "—"} / ${r.model || "—"}  `,
      `**Must split:** ${r.must_split ? "Yes" : "No"}`,
      "",
      `> ${r.tldr}`,
      "",
      "### Why",
      "",
      r.plain_language_why,
      "",
      "### Factor evidence",
      "",
      "| Factor | Level | Evidence |",
      "|---|---|---|",
      ...(r.factors || []).map(f => `| ${markdownCell(prettyId(f.id))} | ${markdownCell(f.level)} | ${markdownCell(f.evidence)} |`),
      "",
      "### Risks",
      "",
      markdownList(r.risks, risk => `**${risk.severity}:** ${risk.description}${risk.mitigation ? ` — Mitigation: ${risk.mitigation}` : ""}`),
      "",
      "### Hidden work",
      "",
      markdownList(r.hidden_work),
      "",
      "### Assumptions",
      "",
      markdownList(r.assumptions),
      "",
      "### Recommended split",
      "",
      markdownList(r.recommended_split, split => `**${split.points} points — ${split.title}:** ${split.why || ""}`),
    );
    if (r.spike_needed) lines.push("", "### Spike", "", r.spike_reason || "Spike recommended.");
    if (item.trace_id) lines.push("", `Trace ID: \`${item.trace_id}\``);
  }
  return lines.join("\n") + "\n";
}

function exportFilename(extension) {
  const stamp = new Date().toISOString().replace(/[:.]/g, "-");
  return `story-pointer-results-${stamp}.${extension}`;
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const anchor = document.createElement("a");
  anchor.href = url;
  anchor.download = filename;
  document.body.appendChild(anchor);
  anchor.click();
  anchor.remove();
  URL.revokeObjectURL(url);
}

function exportMarkdown() {
  if (!window.__final_results) return;
  const markdown = buildMarkdownExport(window.__final_results);
  downloadBlob(new Blob([markdown], {type: "text/markdown;charset=utf-8"}), exportFilename("md"));
}

async function exportExcel() {
  if (!window.__final_results) return;
  const button = $("excel-export-btn");
  button.disabled = true;
  const originalText = button.textContent;
  button.textContent = "Preparing…";
  try {
    const response = await fetch("/export/results.xlsx", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({items: window.__final_results.items}),
    });
    if (!response.ok) throw new Error(await responseError(response) || `Excel export failed (${response.status}).`);
    downloadBlob(await response.blob(), exportFilename("xlsx"));
  } catch (error) {
    $("err").textContent = error instanceof Error ? error.message : String(error);
  } finally {
    button.disabled = false;
    button.textContent = originalText;
  }
}

function resultHtml(r, traceId = "") {
  // INVARIANT CHECK — refuse to show a number without its explanation.
  if (!invariantSatisfied(r)) {
    const reason = !r || r.ok === false
      ? (r && r.error ? r.error : "Backend did not certify this estimate.")
      : "Missing plain-language explanation.";
    return `
      <div class="invariant-warn">
        ⚠ <strong>No estimate shown.</strong> ${escapeHtml(reason)}<br/>
        ResultCard refuses to render a point value without <code>plain_language_why</code> and <code>tldr</code>.
      </div>
      <details class="raw-toggle"><summary>raw payload</summary><pre>${escapeHtml(JSON.stringify(r, null, 2))}</pre></details>`;
  }

  // Points hero
  const pd = r.person_days ? `${r.person_days.min}–${r.person_days.max} person-days` : "";
  let html = `
    <div class="points-hero">
      <div class="num">${r.points}</div>
      <div class="unit">story points<br/>${pd}</div>
      <div class="tldr"><div class="unit">TL;DR</div><div class="tldr-text">${escapeHtml(r.tldr)}</div></div>
    </div>`;

  if (r.must_split) {
    html += `<div class="must-split-banner">⛔ This story is too big (a 13). It must be split before it can be worked on.</div>`;
  }

  // plain language why
  html += `<div class="section"><h3>Why (for the product owner)</h3>
    <div class="why">${escapeHtml(r.plain_language_why)}</div></div>`;

  // factors
  if (r.factors && r.factors.length) {
    html += `<div class="section"><h3>Factor scores (${r.factors.length}/12)</h3><div class="grid2">`;
    for (const f of r.factors) {
      html += `<div class="factor"><span>${escapeHtml(prettyId(f.id))}<span class="ev">${escapeHtml(f.evidence || "")}</span></span><span class="lvl lvl-${f.level}">${f.level}</span></div>`;
    }
    html += `</div></div>`;
  }

  // deciding drivers
  if (r.deciding_drivers && r.deciding_drivers.length) {
    html += `<div class="section"><h3>Deciding drivers</h3><ul class="list">`;
    for (const d of r.deciding_drivers) {
      html += `<li><strong>${escapeHtml(prettyId(d.id))}</strong> — ${escapeHtml(d.why)}</li>`;
    }
    html += `</ul></div>`;
  }

  // anchors
  if (r.closest_anchors && r.closest_anchors.length) {
    html += `<div class="section"><h3>Closest anchors</h3><div class="pill-row">`;
    for (const a of r.closest_anchors) {
      html += `<span class="pill strong">${a.points}pt — ${escapeHtml(a.why || "")}</span>`;
    }
    html += `</div></div>`;
  }

  // per-layer
  const ple = r.per_layer_effort || {};
  html += `<div class="section"><h3>Per-layer effort</h3><div class="grid2">`;
  for (const [k, v] of Object.entries(ple)) {
    html += `<div class="factor"><span>${k}</span><span class="lvl lvl-${v}">${v}</span></div>`;
  }
  html += `</div></div>`;

  // hidden work
  if (r.hidden_work && r.hidden_work.length) {
    html += `<div class="section"><h3>Hidden work implied by ACs</h3><ul class="list">`;
    for (const h of r.hidden_work) html += `<li>${escapeHtml(h)}</li>`;
    html += `</ul></div>`;
  }

  // risks
  if (r.risks && r.risks.length) {
    html += `<div class="section"><h3>Top risks</h3><ul class="list">`;
    for (const r2 of r.risks) {
      html += `<li><span class="lvl lvl-${r2.severity}" style="margin-right:6px">${r2.severity}</span> ${escapeHtml(r2.description)} <span style="color:var(--muted)">— ${escapeHtml(r2.mitigation || "")}</span></li>`;
    }
    html += `</ul></div>`;
  }

  // assumptions + spike
  if (r.assumptions && r.assumptions.length) {
    html += `<div class="section"><h3>Assumptions</h3><ul class="list">`;
    for (const a of r.assumptions) html += `<li>${escapeHtml(a)}</li>`;
    html += `</ul></div>`;
  }
  if (r.spike_needed) {
    html += `<div class="invariant-warn">🔬 Spike recommended: ${escapeHtml(r.spike_reason || "unclear requirements")}</div>`;
  }

  // split
  if (r.recommended_split && r.recommended_split.length) {
    html += `<div class="section"><h3>Recommended split</h3>`;
    for (const s of r.recommended_split) {
      html += `<div class="split-card"><span class="sp">${s.points}pt</span><div class="st">${escapeHtml(s.title)}</div><div style="color:var(--muted);font-size:12px">${escapeHtml(s.why || "")}</div></div>`;
    }
    html += `</div>`;
  }

  // Correlate this rendered estimate with its end-to-end Phoenix trace.
  if (traceId) {
    const phoenixUrl = window.__observability && window.__observability.ui_url;
    html += `<div class="section"><h3>Observability</h3><div class="why">` +
      `Trace <code>${escapeHtml(traceId)}</code>` +
      (phoenixUrl ? ` · <a href="${escapeHtml(phoenixUrl)}" target="_blank" rel="noopener">Open Phoenix monitoring ↗</a>` : "") +
      `</div></div>`;
  }

  // raw
  html += `<details class="raw-toggle"><summary>raw payload</summary><pre>${escapeHtml(JSON.stringify(r, null, 2))}</pre></details>`;

  return html;
}

function clearAll() {
  if (estimateController) estimateController.abort();
  ["m_title","m_desc","m_ac","m_ctx","j_issue"].forEach(id => $(id).value = "");
  window.__jira_story = null; window.__sheet_stories = null; window.__batch_state = null;
  window.__trace_id = null;
  window.__final_results = null;
  window.__result_view = "summary";
  setResultActions(false);
  $("jira_preview").innerHTML = ""; $("sheet_preview").innerHTML = "";
  $("err").textContent = "";
  $("result-body").innerHTML = `<div class="result-empty">Run an estimate to see the evidence-led result here.</div>`;
}

function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);
}
function prettyId(id) {
  return String(id).replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
}

loadConfig();
</script>
